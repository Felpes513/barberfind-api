spring.application.name=barberfind-api
server.port=${SERVER_PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# =============================
# Database (PostgreSQL)
# =============================
# Supabase / cloud: DB_SSLMODE=require (SSL como no Beekeeper). Local tipico: disable.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:barberdb}?sslmode=${DB_SSLMODE:disable}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================
# JPA / Hibernate
# =============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# =============================
# Swagger (SpringDoc)
# =============================
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# =============================
# CORS
# =============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# =============================
# DB
# =============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=public
spring.flyway.table=flyway_schema_history
logging.level.org.flywaydb=INFO

# never | always | on_param (use minusculas no .env)
server.error.include-stacktrace=${SERVER_ERROR_INCLUDE_STACKTRACE:never}

# =============================
# LOGIN
# =============================
# JWT_SECRET: em producao definir no Render (32+ caracteres recomendado).
jwt.secret=${JWT_SECRET:dev-only-change-me-use-32chars-minimum!!}
# Duracao do token em MILISSEGUNDOS (ex.: 3600000 = 1h, 86400000 = 24h).
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}